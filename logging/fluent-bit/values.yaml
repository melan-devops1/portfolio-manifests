###############################################################################
# Fluent Bit Helm values
#
# 역할: 각 노드의 /var/log/containers/*.log 수집 → Elasticsearch로 전송
#
# 결정:
# - DaemonSet (노드마다 1개) — 모든 Pod 로그 수집
# - Elasticsearch output: elasticsearch.logging.svc.cluster.local:9200
# - JSON 파싱 — portfolio-app은 LogstashEncoder로 JSON 출력 (logback prod 프로파일)
# - Index 명: portfolio-YYYY.MM.DD (시계열)
#
# Memory 절감 (Fluentd 대비 ~10x):
# - Fluentd: ~40MB per Pod
# - Fluent Bit: ~4MB per Pod
###############################################################################

# DaemonSet 모드 (default)
kind: DaemonSet

# 노드의 /var/log 마운트 (Pod stdout 로그가 여기 저장됨)
hostNetwork: false
dnsPolicy: ClusterFirstWithHostNet

# Resource (경량)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Tolerations — 모든 노드에 배포 (control plane 제외 — EKS는 노드만)
tolerations:
  - operator: Exists

# Service for monitoring
service:
  type: ClusterIP

# Fluent Bit 설정 — INI 형식
config:
  service: |
    [SERVICE]
        Daemon         Off
        Flush          1
        Log_Level      info
        Parsers_File   /fluent-bit/etc/parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # portfolio-app 외 시스템 로그 필터링 (선택)
    # [FILTER]
    #     Name    grep
    #     Match   kube.*
    #     Regex   $kubernetes['namespace_name'] default

  outputs: |
    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elasticsearch.logging.svc.cluster.local
        Port            9200
        Index           portfolio
        Logstash_Format On
        Logstash_Prefix portfolio
        Time_Key        @timestamp
        Replace_Dots    On
        Retry_Limit     5
        Suppress_Type_Name On
        # ES 8.x는 type 필드 deprecated, Suppress_Type_Name 박제