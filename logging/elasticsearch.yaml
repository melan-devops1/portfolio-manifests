###############################################################################
# Elasticsearch — single-node 시연용
#
# 결정:
# - Deployment (StatefulSet 아님 — PVC 의존 회피, 시연 단순화)
# - in-memory storage — Pod 재시작 시 로그 휘발 (시연 1회용 OK)
# - xpack.security.enabled=false — 인증 없이 시연 (운영 환경 비추)
# - ES 8.15.0 (2026-05 기준 안정)
# - JVM heap 512MB → 1GB 노드에 충분히 들어감
#
# 운영 환경 진화 경로:
# - StatefulSet + PVC (gp3 50GB+)
# - Multi-node (master 3 + data 3)
# - xpack.security.enabled=true + 인증서
# - Index Lifecycle Management (7일 hot → 30일 warm → 90일 삭제)
###############################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  strategy:
    type: Recreate    # in-memory라 RollingUpdate 의미 없음
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # vm.max_map_count 설정 — Elasticsearch 부팅 요구사항
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          securityContext:
            privileged: true
            runAsUser: 0
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: cluster.name
              value: "portfolio-logging"
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: data
          emptyDir: {}    # in-memory (시연용)
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300