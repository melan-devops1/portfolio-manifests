###############################################################################
# AWS Application Load Balancer Ingress
#
# Path-based routing:
#   /api/products/* → product-service:8081
#   /api/orders/*   → order-service:8082
#   /api/payments/* → payment-service:8083
#
# 클라이언트 요청 path가 그대로 백엔드로 전달됨 (rewrite 없음).
# 따라서 컨트롤러의 매핑 path가 그대로 작동 (e.g. @RequestMapping("/api/products")).
#
# AWS Load Balancer Controller가 이 Ingress를 watch하여
# 자동으로 ALB + Target Group + Listener Rule을 생성/관리.
###############################################################################

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: default
  annotations:
    # ALB scheme — 인터넷에서 접근 가능 (시연용)
    # 운영 환경에선 internal + Route53/CloudFront 조합 권장
    alb.ingress.kubernetes.io/scheme: internet-facing

    # Target type — IP 모드 (Pod 직접 라우팅)
    # instance 모드는 NodePort 경유 → 추가 hop 발생
    alb.ingress.kubernetes.io/target-type: ip

    # Listen port
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # 헬스체크 — Spring Boot Actuator readiness
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'

    # 서브넷 자동 발견 — public subnet 태그 (envs/dev에 박제됨)
    # alb.ingress.kubernetes.io/subnets는 미지정 — auto-discovery 사용

    # Group name — 여러 Ingress가 ALB 1개를 공유하려면 필요 (현재는 1개라 무관)
    alb.ingress.kubernetes.io/group.name: portfolio

    # 태그 — 비용 추적
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=portfolio,Component=ingress

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 8081
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8082
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 8083