###############################################################################
# Jaeger UI Ingress — 별도 ALB
#
# 결정 (grafana-ingress 패턴 정합):
# - 별도 ALB (group.name=jaeger)
# - HTTP only
# - Path / 단일 (Jaeger Query UI)
# - Health check: Jaeger Query는 / (200 OK)
#
# Jaeger 포트:
# - 16686: Query UI (이 Ingress 대상)
# - 4317: OTLP gRPC (collector receiver)
# - 4318: OTLP HTTP (collector receiver)
# - 14268: Jaeger Thrift HTTP (legacy)
###############################################################################

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: tracing
  annotations:
    # 별도 ALB
    alb.ingress.kubernetes.io/group.name: jaeger

    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/backend-protocol: HTTP

    # Health check — Jaeger Query UI는 root path
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'

    alb.ingress.kubernetes.io/tags: Environment=dev,Project=portfolio,Component=jaeger

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Jaeger chart의 query Service 이름
                # all-in-one 모드: <release-name>-query 형식
                # ArgoCD release name = Application 이름 = "jaeger"
                # 실제 이름 검증: kubectl get svc -n tracing
                name: jaeger-query
                port:
                  number: 16686