###############################################################################
# ArgoCD Helm Chart Values
#
# Chart: argo/argo-cd v9.5.0
# ArgoCD: v3.3.6
# 검증 환경: EKS 1.33 (2026-04 기준)
#
# 핵심 설정 결정:
# 1. server.--insecure: ArgoCD default(HTTPS-only listen + HTTP→HTTPS auto-redirect) 비활성.
#    ALB(HTTP)→ArgoCD가 HTTPS-redirect 응답→ALB가 HTTP로 follow… 무한 redirect loop 회피.
#    현재 ALB도 HTTP 80만 listen (시연 단계, certificate-arn 미설정).
#    ACM/HTTPS termination은 Phase 5+ 예정 — 그때는 ALB가 진짜 TLS termination 담당.
# 2. service: ClusterIP (Ingress가 ALB로 노출)
# 3. dex.enabled: false (외부 OIDC 미사용, Phase 5+ 검토)
# 4. notifications.enabled: false (Phase 5+ Slack 알림 도입 시 활성화)
###############################################################################

global:
  # Pod Security 표준 (ADR 박제 가치)
  securityContext:
    runAsNonRoot: true
    runAsUser: 999

# ─── ArgoCD Server (UI + API) ──────────────────────────────────
server:
  # ArgoCD default(HTTPS-only listen + HTTP→HTTPS auto-redirect) 비활성.
  # 현재 ALB도 HTTP 80만 listen이라 redirect loop 회피용 (시연 HTTP).
  # ACM/HTTPS termination 추가는 Phase 5+ — 그때도 이 플래그는 유지 (ALB→ArgoCD 구간은 HTTP).
  extraArgs:
    - --insecure

  service:
    type: ClusterIP   # Ingress(ALB)가 외부 노출 담당

  # ArgoCD UI 자체엔 readiness/liveness probe 자동 설정됨
  # Pod 부팅 ~30초

# ─── Application Controller (sync 엔진) ────────────────────────
controller:
  # 단일 controller (sharded는 운영 단계에서)
  replicas: 1

# ─── Repo Server (Git 동기화) ──────────────────────────────────
repoServer:
  replicas: 1

# ─── Redis (캐시) ──────────────────────────────────────────────
redis:
  enabled: true

# ─── Dex (외부 OIDC 인증) ──────────────────────────────────────
# 비활성화 — local admin 계정만 사용
# Phase 5+에서 GitHub OAuth 연동 검토
dex:
  enabled: false

# ─── ApplicationSet ────────────────────────────────────────────
# 멀티 환경/멀티 클러스터 자동 생성기
# 1인 dev 환경엔 불필요, 미사용
applicationSet:
  enabled: false

# ─── Notifications ─────────────────────────────────────────────
# 비활성화 — Phase 5+ Slack 알림 도입 시 활성화
notifications:
  enabled: false

# ─── ArgoCD configs ────────────────────────────────────────────
configs:
  # 추가 파라미터 (ConfigMap argocd-cmd-params-cm)
  params:
    # server.insecure는 extraArgs로 이미 설정됨
    # 여기엔 추가 운영 파라미터
    server.disable.auth: "false"   # admin 인증 활성화 (default)

  # CMP(Config Management Plugin) 미사용 — Kustomize는 기본 지원
  cmp:
    create: false