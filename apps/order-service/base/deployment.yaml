###############################################################################
# order-service Deployment (base)
#
# 다운스트림 호출:
#   - product-service (8081) — 재고 확인
#   - payment-service (8083) — 결제 처리
#
# 내부 DNS 사용:
#   K8s default namespace 내에선 단순히 service-name 만으로 호출 가능.
#   FQDN: <service>.default.svc.cluster.local
#
# Phase 3 임시: SPRING_PROFILES_ACTIVE=local (H2 in-memory)
# Phase 4에서 k8s 프로파일 + RDS로 전환 예정
###############################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: order-service          
          image: portfolio/order-service    # abstract — kustomization images 매핑
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8082
              protocol: TCP

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8082"
            # 다운스트림 호출 대상 — K8s 내부 DNS
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8081"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8083"

          envFrom:
            - configMapRef:
                name: portfolio-db-config
            - secretRef:
                name: portfolio-db-credentials

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL