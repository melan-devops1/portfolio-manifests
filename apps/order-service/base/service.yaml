###############################################################################
# order-service Service (ClusterIP)
#
# 내부 호출 패턴:
#   클라이언트(예: 외부 트래픽 via Ingress) → order-service:8082
#   order-service → product-service:8081, payment-service:8083
###############################################################################

apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP