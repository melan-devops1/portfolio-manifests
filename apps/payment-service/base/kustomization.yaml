apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml

# Image 자동 갱신 대상 (GitHub Actions가 newTag를 commit-sha로 update)
images:
  - name: portfolio/payment-service
    newName: 601766312629.dkr.ecr.ap-northeast-2.amazonaws.com/portfolio/payment-service
    newTag: "0.1.0"   # GitHub Actions가 매 push마다 commit-sha로 갱신

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: payment-service
      app.kubernetes.io/part-of: portfolio
      app.kubernetes.io/managed-by: kustomize