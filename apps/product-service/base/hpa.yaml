###############################################################################
# product-service HorizontalPodAutoscaler
#
# CPU 기반 자동 스케일링.
# metrics-server Add-on 활성화 필수 (EKS default 미포함).
#
# 동작:
#   minReplicas=2: 항상 2개 유지 (HA 보장)
#   maxReplicas=4: 노드 max=4와 정합
#   target CPU 50%: Pod 평균 CPU 사용률이 50% 넘으면 스케일아웃
###############################################################################

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    # 스케일아웃은 빠르게 (트래픽 증가 대응)
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    # 스케일인은 천천히 (출렁임 방지)
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60