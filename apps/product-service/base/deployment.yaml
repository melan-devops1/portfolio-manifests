###############################################################################
# product-service Deployment (base)
#
# 환경 무관 공통 설정. 환경별 차이(replicas)는 overlays/<env>/에서 patch.
#
# ⚠️ Phase 3 임시 결정: SPRING_PROFILES_ACTIVE=local
#    이유:
#      - application.yaml의 prod 프로파일은 PostgreSQL 하드코딩(driver-class-name)
#      - Phase 3에선 RDS 미배포 — DB 의존성 없이 K8s 배포 검증이 목표
#      - local 프로파일은 H2 in-memory가 default라 외부 DB 불필요
#    Phase 4 진입 시:
#      - RDS PostgreSQL 모듈 추가
#      - application.yaml에 k8s 프로파일 신설 (JSON 로그 + RDS)
#      - SPRING_PROFILES_ACTIVE=k8s 로 전환
#
# ECR pull 인증:
#   EKS 노드의 IAM Role에 AmazonEC2ContainerRegistryReadOnly 정책이 자동 attach돼있어
#   imagePullSecrets 불필요. 노드 부팅 시 kubelet이 ECR 자동 인증.
###############################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-service
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: product-service
          image: 601766312629.dkr.ecr.ap-northeast-2.amazonaws.com/portfolio/product-service:0.1.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          # 환경 변수 — Phase 3는 local 프로파일 (H2 in-memory)
          # Phase 4에서 k8s 프로파일 + RDS로 전환 예정
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "local"
            - name: SERVER_PORT
              value: "8081"

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup Probe — Spring Boot 부팅 시간 보호
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL