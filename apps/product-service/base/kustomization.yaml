###############################################################################
# product-service Kustomize base
#
# base는 환경 무관 공통 정의의 모음.
# overlays/<env>는 이 base를 참조하여 환경별 차이만 patch.
###############################################################################

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 이 base에 포함될 자원 목록
resources:
- deployment.yaml
- service.yaml
- hpa.yaml

# Image 자동 갱신 대상 (GitHub Actions가 newTag를 commit-sha로 update)
images:
- name: portfolio/product-service
  newName: 601766312629.dkr.ecr.ap-northeast-2.amazonaws.com/portfolio/product-service
  newTag: 2bf3d4a

# 모든 자원에 자동 부착될 공통 라벨
# (kustomize v5는 labels.includeSelectors 옵션으로 selector도 함께 갱신 가능)
labels:
- pairs:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: portfolio
